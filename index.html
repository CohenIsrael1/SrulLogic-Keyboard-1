<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>SrulLogic | מקלדת הפוכה - הפתרון המהיר ביותר</title>
    <meta name="description" content="הקלדתם בטעות באנגלית? SrulLogic Elite הופך מקלדת הפוכה לעברית ולהיפך בלחיצת כפתור. הכלי המקצועי והמעוצב ביותר.">
    <meta name="keywords" content="מקלדת הפוכה, הפוך מקלדת, עברית לאנגלית, אנגלית לעברית, SrulLogic">

    <style>
        :root {
            --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --border: #dddfe2;
            --primary: linear-gradient(135deg, #0062ff 0%, #00c6ff 100%);
            --shadow: 0 12px 28px 0 rgba(0, 0, 0, 0.1);
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
        }
        .card {
            background: var(--card); border-radius: 20px; box-shadow: var(--shadow);
            padding: 30px; width: 100%; max-width: 420px; text-align: center;
        }

        /* לוגו */
        .logo-box {
            width: 80px; height: 80px; margin: 0 auto 15px; border-radius: 15px;
            background: white; border: 1px solid var(--border); overflow: hidden;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 1.8rem; margin: 0; font-weight: 800; background: var(--primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { font-size: 0.75rem; color: #65676b; margin-bottom: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* סוויץ' מצבים */
        .tabs { display: flex; background: #f0f2f5; padding: 4px; border-radius: 12px; margin-bottom: 15px; position: relative; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; font-weight: 700; color: #65676b; z-index: 2; transition: 0.3s; }
        .tab-btn.active { color: white; }
        .glider { position: absolute; height: calc(100% - 8px); width: calc(50% - 4px); background: var(--primary); border-radius: 10px; transition: 0.4s ease; z-index: 1; left: 4px; }
        .manual-mode .glider { transform: translateX(100%); }

        /* כפתורי בחירת שפה במצב ידני */
        .lang-options { display: none; gap: 8px; margin-bottom: 15px; }
        .manual-mode .lang-options { display: flex; }
        .lang-btn { flex: 1; padding: 8px; border: 2px solid var(--border); border-radius: 8px; background: white; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .lang-btn.active { border-color: #0062ff; background: #e7f3ff; color: #0062ff; }

        textarea {
            width: 100%; height: 85px; padding: 12px; border: 1px solid var(--border); border-radius: 12px;
            font-size: 1rem; resize: none; outline: none; box-sizing: border-box; background: #f5f6f7;
            margin-bottom: 10px; font-family: inherit; transition: 0.2s;
        }
        textarea:focus { background: white; border-color: #0062ff; box-shadow: 0 0 0 2px #e7f3ff; }

        /* גריד כפתורים */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; color: white; transition: 0.2s; font-size: 0.9rem; }
        .btn-main { background: #0062ff; grid-column: span 2; font-size: 1rem; } /* כפתור העתקה */
        .btn-wa { background: #25d366; }
        .btn-clear { background: #f02849; }
        .btn-google { background: #4285f4; grid-column: span 2; }
        .btn:hover { opacity: 0.9; transform: scale(0.98); }

        .footer { margin-top: 20px; font-size: 0.7rem; color: #8a8d91; border-top: 1px solid var(--border); padding-top: 15px; }
    </style>
</head>
<body class="auto-mode">

<div class="card">
    <div class="logo-box">
        <img src="logo.png" alt="S" onerror="this.style.display='none'; this.parentNode.innerHTML='<b style=\'color:#0062ff;font-size:2rem\'>S</b>'">
    </div>
    
    <h1>Keyboard Elite</h1>
    <p class="sub">SrulLogic Systems</p>

    <div class="tabs">
        <div class="glider"></div>
        <button class="tab-btn active" id="tab-auto" onclick="setMode('auto')">אוטומטי</button>
        <button class="tab-btn" id="tab-manual" onclick="setMode('manual')">ידני</button>
    </div>

    <div class="lang-options">
        <button class="lang-btn active" id="toHe" onclick="setDir('toHe')">English ➔ עברית</button>
        <button class="lang-btn" id="toEn" onclick="setDir('toEn')">עברית ➔ English</button>
    </div>

    <textarea id="input" placeholder="הקלידו כאן טקסט הפוך..."></textarea>
    <textarea id="output" readonly placeholder="התוצאה תופיע כאן..."></textarea>

    <div class="btn-grid">
        <button class="btn btn-main" onclick="copyText()">📋 העתק תוצאה</button>
        <button class="btn btn-wa" onclick="shareWA()">WhatsApp</button>
        <button class="btn btn-clear" onclick="clearAll()">נקה</button>
        <button class="btn btn-google" onclick="searchG()">🔍 חפש בגוגל</button>
    </div>

    <p class="footer">© 2026 SrulLogic | פתרון מנצח למקלדת הפוכה</p>
</div>

<script>
    const enHe = {'q':'/','w':'\'','e':'ק','r':'ר','t':'א','y':'ט','u':'ו','i':'ן','o':'ם','p':'פ','a':'ש','s':'ד','d':'ג','f':'כ','g':'ע','h':'י','j':'ח','k':'ל','l':'ך',';':'ף','\'':',','z':'ז','x':'ס','c':'ב','v':'ה','b':'נ','n':'מ','m':'צ',',':'ת','.':'ץ','/':'.'};
    const heEn = {'/':'q','\'':'w','ק':'e','ר':'r','א':'t','ט':'y','ו':'u','ן':'i','ם':'o','פ':'p','ש':'a','ד':'s','ג':'d','כ':'f','ע':'g','י':'h','ח':'j','ל':'k','ך':'l','ף':';',',':'\'','ז':'z','ס':'x','ב':'c','ה':'v','נ':'b','מ':'n','צ':'m','ת':',','ץ':'.','.':'/'};
    
    let mode = 'auto';
    let dir = 'toHe';

    const inp = document.getElementById('input');
    const out = document.getElementById('output');

    inp.addEventListener('input', run);

    function run() {
        const text = inp.value;
        if (mode === 'auto') {
            out.value = text.split('').map(c => enHe[c.toLowerCase()] || heEn[c] || c).join('');
        } else {
            const map = (dir === 'toHe') ? enHe : heEn;
            out.value = text.split('').map(c => map[c.toLowerCase()] || map[c] || c).join('');
        }
    }

    function setMode(m) {
        mode = m;
        document.body.className = m + '-mode';
        document.getElementById('tab-auto').classList.toggle('active', m === 'auto');
        document.getElementById('tab-manual').classList.toggle('active', m === 'manual');
        run();
    }

    function setDir(d) {
        dir = d;
        document.getElementById('toHe').classList.toggle('active', d === 'toHe');
        document.getElementById('toEn').classList.toggle('active', d === 'toEn');
        run();
    }

    function copyText() {
        if (!out.value) return;
        navigator.clipboard.writeText(out.value);
        const b = document.querySelector('.btn-main');
        b.innerText = "הועתק! ✅";
        setTimeout(() => b.innerText = "📋 העתק תוצאה", 1500);
    }

    function clearAll() { inp.value = ''; out.value = ''; }
    function shareWA() { if(out.value) window.open(`https://wa.me/?text=${encodeURIComponent(out.value)}`); }
    function searchG() { if(out.value) window.open(`https://www.google.com/search?q=${encodeURIComponent(out.value)}`); }
</script>
</body>
</html>
